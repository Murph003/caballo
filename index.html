<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚠️ Verificación de seguridad</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
  }
  #pantalla {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: red;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 9999;
  }
  #pantalla img {
    width: 80%;
    max-width: 400px;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 20px #00ffff);
  }
  #texto {
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 4px #000;
  }
</style>
</head>
<body>
<audio id="alarma" loop>
  <source src="alarma.mp3" type="audio/mpeg">
</audio>

<div id="pantalla">
  <img src="https://i.imgur.com/8b1M4Jk.png" alt="susto">
  <div id="texto">¡VIRUS DETECTADO!<br>TOCA PARA ELIMINAR</div>
</div>

<script>
  const alarma = document.getElementById('alarma');
  
  // Vibración + sonido al tocar
  document.body.addEventListener('click', () => {
    alarma.play();
    if (navigator.vibrate) {
      navigator.vibrate([200, 100, 200, 100, 200]);
    }
  }, { once: true });

  // A los 3 segundos muestra que es joda
  setTimeout(() => {
    document.getElementById('pantalla').style.background = 'black';
    document.getElementById('texto').innerHTML = 'Es joda 😆<br>Te asustaste?';
    alarma.pause();
  }, 3000);
</script>
</body>
</html>
