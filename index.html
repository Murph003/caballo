<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        body, html { margin: 0; height: 100%; overflow: hidden; background: black; }
        #pantalla {
            width: 100%; height: 100%;
            background: red;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 28px; font-family: Arial; text-align: center;
        }
        .oculto { display: none; }
    </style>
</head>
<body onclick="activar()">
    <div id="pantalla">
        <div id="susto">
            <h1>⚠️ VIRUS DETECTED ⚠️</h1>
            <p>ACCESSING YOUR FILES...</p>
        </div>
        <div id="revelar" class="oculto">
            <h1>YOU HAVE BEEN HACKED</h1>
            <p>Bye Bye stupid</p>
        </div>
    </div>

    <audio id="alarma" src="https://youtu.be/bFTXH4mb1Lw?si=pg_kAhMnazVPOE3c"></audio>
    
    <script>
        function activar() {
            document.documentElement.requestFullscreen();
            if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500, 600]);
            document.getElementById('alarma').play();
            
            // Después de 3 segundos cambia el texto
            setTimeout(() => {
                document.getElementById('susto').classList.add('oculto');
                document.getElementById('revelar').classList.remove('oculto');
                document.getElementById('pantalla').style.background = "Red";
            }, 3000);
        }
    </script>
</body>
</html>
